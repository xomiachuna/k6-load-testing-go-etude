global:
  scrape_interval: "5s"

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - "localhost:9090"
  - job_name: api
    static_configs:
      - targets:
          - "localhost:8080"
  - job_name: postgres-exporter
    static_configs:
      - targets:
          - "localhost:9187"
